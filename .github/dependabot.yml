version: 2

updates:
  # Docker base image updates for base/Dockerfile
  - package-ecosystem: "docker"
    directories:
      - "/base"
      - "/magento"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
      include: "scope"
    reviewers:
      - "SamJUK"
    groups:
      docker-dependencies:
        patterns:
          - "*"

  # GitHub Actions workflow updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    reviewers:
      - "SamJUK"
