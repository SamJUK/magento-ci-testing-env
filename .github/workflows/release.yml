name: Release

# Tag push only. Builds + pushes + signs the full matrix, then creates the
# GitHub release - one linear pipeline, no cross-workflow handoff.
#
# master push (build + smoke test, no publish) lives in master-validate.yml -
# kept separate since it's a different concern with a different trigger.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  security-events: write

env:
  DOCKER_BUILDKIT: 1
  BUILDKIT_PROGRESS: plain

jobs:
  secret-scan:
    name: Secret Scanning with TruffleHog
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # Fetch all history for TruffleHog to scan

      - name: Run TruffleHog secret scan
        uses: trufflesecurity/trufflehog@116e7171542d2f1dad8810f00dcfacbe0b809183 # v3.92.5
        with:
          path: ./
          extra_args: --only-verified

      - name: TruffleHog scan (all secrets, non-blocking)
        if: always()
        uses: trufflesecurity/trufflehog@116e7171542d2f1dad8810f00dcfacbe0b809183 # v3.92.5
        continue-on-error: true
        with:
          path: ./
          extra_args: --json
        id: trufflehog-scan

  prepare-matrix:
    name: Prepare Build Matrix
    runs-on: ubuntu-latest
    needs: secret-scan
    outputs:
      matrix-base: ${{ steps.set-matrix.outputs.matrix-base }}
      matrix-magento: ${{ steps.set-matrix.outputs.matrix-magento }}
      matrix-mageos: ${{ steps.set-matrix.outputs.matrix-mageos }}
      git-tag: ${{ steps.set-tag.outputs.git-tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set version tag
        id: set-tag
        run: |
            echo "git-tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate build matrices
        id: set-matrix
        run: |
          RESULT=$(./scripts/filter-matrix.sh)
          echo "matrix-base=$(echo "$RESULT" | jq -c '."matrix-base"')" >> $GITHUB_OUTPUT
          echo "matrix-magento=$(echo "$RESULT" | jq -c '."matrix-magento"')" >> $GITHUB_OUTPUT
          echo "matrix-mageos=$(echo "$RESULT" | jq -c '."matrix-mageos"')" >> $GITHUB_OUTPUT

      - name: Display matrices
        run: |
          echo "Git Tag: ${{ steps.set-tag.outputs.git-tag }}"
          echo "Base Matrix: ${{ steps.set-matrix.outputs.matrix-base }}"
          echo "Magento Matrix: ${{ steps.set-matrix.outputs.matrix-magento }}"
          echo "Mage-OS Matrix: ${{ steps.set-matrix.outputs.matrix-mageos }}"

  build-base-images:
    name: Build Base Image (PHP ${{ matrix.php }})
    needs: prepare-matrix
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix-base) }}
    uses: ./.github/workflows/_build-image.yml
    with:
      image-name: magento-base-ci-testing-env
      build-type: base
      tag-suffix: ${{ matrix.php }}
      build-args: |
        PHP_VERSION=${{ matrix.php }}
      cache-scope: base-${{ matrix.php }}
    secrets:
      dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
      dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
      github-token: ${{ secrets.GITHUB_TOKEN }}

  build-magento-images:
    name: Build Magento Image (${{ matrix.version }}-php${{ matrix.php }})
    needs: [prepare-matrix, build-base-images]
    if: needs.prepare-matrix.outputs.matrix-magento != '{"include":[]}'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix-magento) }}
    uses: ./.github/workflows/_build-image.yml
    with:
      image-name: magento-ci-testing-env
      build-type: magento
      tag-suffix: ${{ matrix.version }}-php${{ matrix.php }}
      build-args: |
        PHP_VERSION=${{ matrix.php }}
        APP_DISTRO=magento
        APP_VERSION=${{ matrix.version }}
      cache-scope: magento-php${{ matrix.php }}
    secrets:
      dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
      dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
      github-token: ${{ secrets.GITHUB_TOKEN }}

  build-mageos-images:
    name: Build Mage-OS Image (${{ matrix.version }}-php${{ matrix.php }})
    needs: [prepare-matrix, build-base-images]
    if: needs.prepare-matrix.outputs.matrix-mageos != '{"include":[]}'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix: ${{ fromJson(needs.prepare-matrix.outputs.matrix-mageos) }}
    uses: ./.github/workflows/_build-image.yml
    with:
      image-name: mage-os-ci-testing-env
      build-type: magento
      tag-suffix: ${{ matrix.version }}-php${{ matrix.php }}
      build-args: |
        PHP_VERSION=${{ matrix.php }}
        APP_DISTRO=mage-os
        APP_VERSION=${{ matrix.version }}
      cache-scope: mageos-php${{ matrix.php }}
    secrets:
      dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
      dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
      github-token: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    needs: [prepare-matrix, build-base-images, build-magento-images, build-mageos-images]
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Get tag information
        id: tag-info
        env:
          TAG_NAME: ${{ needs.prepare-matrix.outputs.git-tag }}
        run: |
          echo "tag-name=$TAG_NAME" >> $GITHUB_OUTPUT

          # Get the previous tag for changelog generation
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -A1 "^$TAG_NAME$" | tail -n1 || echo "")
          echo "previous-tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT

          # Check if this is a pre-release
          if [[ "$TAG_NAME" =~ -(alpha|beta|rc) ]]; then
            echo "is-prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is-prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate image manifest with digests
        id: generate-manifest
        env:
          TAG_NAME: ${{ steps.tag-info.outputs.tag-name }}
        run: |
          mkdir -p release-artifacts

          cat > release-artifacts/IMAGE_MANIFEST.txt << EOF
          # Docker Image Manifest
          # Release: ${TAG_NAME}
          # Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          This release includes the following Docker images.
          All images are signed with Cosign and include attestations.

          ## Base Images (PHP Runtime Environments)
          EOF

          jq -r 'keys[]' manifest.json | while read -r php; do
            echo "" >> release-artifacts/IMAGE_MANIFEST.txt
            echo "### PHP ${php}" >> release-artifacts/IMAGE_MANIFEST.txt
            echo "- samjuk/magento-base-ci-testing-env:${php}" >> release-artifacts/IMAGE_MANIFEST.txt
            echo "- samjuk/magento-base-ci-testing-env:${php}-${TAG_NAME}" >> release-artifacts/IMAGE_MANIFEST.txt
            echo "- ghcr.io/samjuk/magento-base-ci-testing-env:${php}" >> release-artifacts/IMAGE_MANIFEST.txt
            echo "- ghcr.io/samjuk/magento-base-ci-testing-env:${php}-${TAG_NAME}" >> release-artifacts/IMAGE_MANIFEST.txt
          done

          echo "" >> release-artifacts/IMAGE_MANIFEST.txt
          echo "## Magento Images" >> release-artifacts/IMAGE_MANIFEST.txt

          jq -r 'to_entries[] | .key as $php | .value.magento[]? | "\(.)-php\($php)"' manifest.json | while read -r version; do
            echo "" >> release-artifacts/IMAGE_MANIFEST.txt
            echo "### Magento ${version}" >> release-artifacts/IMAGE_MANIFEST.txt
            echo "- samjuk/magento-ci-testing-env:${version}" >> release-artifacts/IMAGE_MANIFEST.txt
            echo "- samjuk/magento-ci-testing-env:${version}-${TAG_NAME}" >> release-artifacts/IMAGE_MANIFEST.txt
            echo "- ghcr.io/samjuk/magento-ci-testing-env:${version}" >> release-artifacts/IMAGE_MANIFEST.txt
            echo "- ghcr.io/samjuk/magento-ci-testing-env:${version}-${TAG_NAME}" >> release-artifacts/IMAGE_MANIFEST.txt
          done

          if jq -e 'to_entries[] | .value."mage-os" // empty' manifest.json > /dev/null 2>&1; then
            echo "" >> release-artifacts/IMAGE_MANIFEST.txt
            echo "## Mage-OS Images" >> release-artifacts/IMAGE_MANIFEST.txt

            jq -r 'to_entries[] | .key as $php | .value."mage-os"[]? | "\(.)-php\($php)"' manifest.json | while read -r version; do
              echo "" >> release-artifacts/IMAGE_MANIFEST.txt
              echo "### Mage-OS ${version}" >> release-artifacts/IMAGE_MANIFEST.txt
              echo "- samjuk/mage-os-ci-testing-env:${version}" >> release-artifacts/IMAGE_MANIFEST.txt
              echo "- samjuk/mage-os-ci-testing-env:${version}-${TAG_NAME}" >> release-artifacts/IMAGE_MANIFEST.txt
              echo "- ghcr.io/samjuk/mage-os-ci-testing-env:${version}" >> release-artifacts/IMAGE_MANIFEST.txt
              echo "- ghcr.io/samjuk/mage-os-ci-testing-env:${version}-${TAG_NAME}" >> release-artifacts/IMAGE_MANIFEST.txt
            done
          fi

          echo "" >> release-artifacts/IMAGE_MANIFEST.txt
          echo "## Verification" >> release-artifacts/IMAGE_MANIFEST.txt
          echo "" >> release-artifacts/IMAGE_MANIFEST.txt
          echo "All images are signed with Cosign. Verify signatures with:" >> release-artifacts/IMAGE_MANIFEST.txt
          echo '```bash' >> release-artifacts/IMAGE_MANIFEST.txt
          echo 'cosign verify samjuk/<image-name>:<tag> \' >> release-artifacts/IMAGE_MANIFEST.txt
          echo '  --certificate-identity-regexp="https://github.com/SamJUK" \' >> release-artifacts/IMAGE_MANIFEST.txt
          echo '  --certificate-oidc-issuer="https://token.actions.githubusercontent.com"' >> release-artifacts/IMAGE_MANIFEST.txt
          echo '```' >> release-artifacts/IMAGE_MANIFEST.txt

          cp manifest.json release-artifacts/build-manifest.json

      - name: Delete existing draft release if present
        id: check-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.tag-info.outputs.tag-name }}
        run: |
          if gh release view "$TAG_NAME" 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Found existing release for $TAG_NAME - deleting to recreate fresh..."
            gh release delete "$TAG_NAME" --yes --cleanup-tag=false
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate release notes
        id: release-notes
        env:
          TAG_NAME: ${{ steps.tag-info.outputs.tag-name }}
          PREVIOUS_TAG: ${{ steps.tag-info.outputs.previous-tag }}
        run: |
          cat > release_notes.md << 'EOF'
          ## Docker Images Built

          This release includes the following Docker images:

          ### Base Images (PHP)
          EOF

          jq -r 'keys[]' manifest.json | while read -r php; do
            echo "- \`samjuk/magento-base-ci-testing-env:${php}\`" >> release_notes.md
            echo "- \`ghcr.io/samjuk/magento-base-ci-testing-env:${php}\`" >> release_notes.md
          done

          echo "" >> release_notes.md
          echo "### Magento Images" >> release_notes.md

          jq -r 'to_entries[] | .key as $php | .value.magento[]? | "\(.)-php\($php)"' manifest.json | while read -r version; do
            echo "- \`samjuk/magento-ci-testing-env:${version}\`" >> release_notes.md
            echo "- \`ghcr.io/samjuk/magento-ci-testing-env:${version}\`" >> release_notes.md
          done

          if jq -e 'to_entries[] | .value."mage-os" // empty' manifest.json > /dev/null 2>&1; then
            echo "" >> release_notes.md
            echo "### Mage-OS Images" >> release_notes.md
            jq -r 'to_entries[] | .key as $php | .value."mage-os"[]? | "\(.)-php\($php)"' manifest.json | while read -r version; do
              echo "- \`samjuk/mage-os-ci-testing-env:${version}\`" >> release_notes.md
              echo "- \`ghcr.io/samjuk/mage-os-ci-testing-env:${version}\`" >> release_notes.md
            done
          fi

          echo "" >> release_notes.md
          echo "## Registries" >> release_notes.md
          echo "" >> release_notes.md
          echo "- **Docker Hub:** https://hub.docker.com/u/samjuk" >> release_notes.md
          echo "- **GitHub Container Registry:** https://github.com/orgs/SamJUK/packages?repo_name=magento-ci-testing-env" >> release_notes.md

          echo "" >> release_notes.md
          echo "## 📋 Release Artifacts" >> release_notes.md
          echo "" >> release_notes.md
          echo "- **IMAGE_MANIFEST.txt** - Complete list of all Docker images with tags and verification instructions" >> release_notes.md
          echo "- **build-manifest.json** - Build configuration showing PHP/Magento/Mage-OS version matrix" >> release_notes.md

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "" >> release_notes.md
            echo "## Changes Since $PREVIOUS_TAG" >> release_notes.md
            echo "" >> release_notes.md
            git log --pretty=format:"- %s (%h)" "${PREVIOUS_TAG}..${TAG_NAME}" >> release_notes.md || true
          fi

          echo "notes-file=release_notes.md" >> $GITHUB_OUTPUT

      - name: Create Draft Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ steps.tag-info.outputs.tag-name }}
          name: Release ${{ steps.tag-info.outputs.tag-name }}
          body_path: ${{ steps.release-notes.outputs.notes-file }}
          draft: true
          prerelease: ${{ steps.tag-info.outputs.is-prerelease }}
          generate_release_notes: false
          files: release-artifacts/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        env:
          RELEASE_EXISTS: ${{ steps.check-release.outputs.exists }}
          TAG_NAME: ${{ steps.tag-info.outputs.tag-name }}
          IS_PRERELEASE: ${{ steps.tag-info.outputs.is-prerelease }}
        run: |
          if [ "$RELEASE_EXISTS" = "true" ]; then
            echo "## Draft Release Recreated ♻️" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "An existing draft release was deleted and recreated with fresh artifacts." >> $GITHUB_STEP_SUMMARY
          else
            echo "## Draft Release Created ✨" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "A new draft release has been created." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** $TAG_NAME" >> $GITHUB_STEP_SUMMARY
          echo "**Pre-release:** $IS_PRERELEASE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Releases](${{ github.server_url }}/${{ github.repository }}/releases)" >> $GITHUB_STEP_SUMMARY

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [secret-scan, prepare-matrix, build-base-images, build-magento-images, build-mageos-images, create-release]
    if: always()
    steps:
      - name: Check build status
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release Tag:** ${{ needs.prepare-matrix.outputs.git-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security Scans" >> $GITHUB_STEP_SUMMARY
          echo "- Secret Scanning: ${{ needs.secret-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Results" >> $GITHUB_STEP_SUMMARY
          echo "- Base Images: ${{ needs.build-base-images.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Magento Images: ${{ needs.build-magento-images.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Mage-OS Images: ${{ needs.build-mageos-images.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Release: ${{ needs.create-release.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Registries" >> $GITHUB_STEP_SUMMARY
          echo "- Docker Hub: https://hub.docker.com/u/samjuk" >> $GITHUB_STEP_SUMMARY
          echo "- GHCR: https://github.com/orgs/SamJUK/packages?repo_name=magento-ci-testing-env" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any build failed
        if: |
          needs.secret-scan.result == 'failure' ||
          needs.build-base-images.result == 'failure' ||
          needs.build-magento-images.result == 'failure' ||
          needs.build-mageos-images.result == 'failure' ||
          needs.create-release.result == 'failure'
        run: |
          echo "One or more builds failed!"
          exit 1
